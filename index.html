<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Nuvemshop - Gerador de Briefing</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/mammoth@1.6.0/mammoth.browser.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh;background:#F0F4FF;font-family:Inter,system-ui,sans-serif}
#root{min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:32px 16px}
input,textarea,button{font-family:inherit}
textarea{resize:vertical}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useRef} = React;
const B = {blue:"#0050C3",sky:"#00B4E6",clear:"#99D3FF",dark:"#100E4C",white:"#FFFFFF",tint:"#E8F2FF",lt:"#F4F8FF",bdr:"#BDD5FF",gray:"#6B7280",bg:"#F4F6FA"};
const STEPS = ["Identificacao","Contexto","CTA e Entregas","Mensagens","Preview"];
const INIT = {id:"",inf:"",tema:"",data:"",entregas:"",formato:"9:16 vertical",collab:"",resp:"",contexto:"",linkMat:"",obj1:"",obj2:"",obj3:"",cta:"",linkCta:"",e1tema:"",e1data:"",e1fmt:"Reels",e1obj:"",e1dest:"",msg1:"",msg1s:"",msg2:"",msg2s:"",msg3:"",msg3s:""};

async function callAI(prompt, ctx) {
  const sys = "Voce e especialista em social media da Nuvemshop. Tom: direto, atrevido, otimista. Responda APENAS com o texto pedido." + (ctx ? "\n\nContexto:\n" + ctx : "");
  const r = await fetch("https://api.anthropic.com/v1/messages", {
    method:"POST", headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:sys,messages:[{role:"user",content:prompt}]})
  });
  const d = await r.json();
  return d.content?.[0]?.text || "";
}

function App() {
  const [step, setStep] = useState(0);
  const [F, setF] = useState(INIT);
  const [imp, setImp] = useState({});
  const [ctx, setCtx] = useState("");
  const [fileName, setFileName] = useState("");
  const [loading, setLoading] = useState(false);
  const [loadMsg, setLoadMsg] = useState("");
  const [aiSum, setAiSum] = useState("");
  const fileRef = useRef();

  const set = (k,v) => setF(f => ({...f,[k]:v}));

  const improve = async (k, label) => {
    if (!F[k]?.trim()) return;
    setImp(i => ({...i,[k]:true}));
    try { const t = await callAI("Melhore para briefing Nuvemshop. Campo: " + label + "\n\n" + F[k], ctx); set(k,t); } catch(e){}
    setImp(i => ({...i,[k]:false}));
  };

  const handleFile = async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    setCtx(""); setFileName(file.name); setLoading(true); setLoadMsg("Lendo...");
    try {
      if (file.name.endsWith(".docx")) {
        const buf = await file.arrayBuffer();
        const {value} = await mammoth.extractRawText({arrayBuffer:buf});
        setCtx(value.slice(0,4000));
      } else if (file.type.startsWith("text/")) {
        setCtx((await file.text()).slice(0,4000));
      }
    } catch(err){}
    setLoading(false); setLoadMsg("");
  };

  const gerarDoDoc = async () => {
    if (!ctx) return;
    setLoading(true); setLoadMsg("Gerando a partir do documento...");
    try {
      const raw = await callAI('Com base no contexto, preencha para briefing Nuvemshop. Influenciador: ' + F.inf + '. Tema: ' + F.tema + '. Responda EXATAMENTE neste JSON: {"contexto":"...","obj1":"...","obj2":"...","obj3":"..."}', ctx);
      const parsed = JSON.parse(raw.replace(/```json|```/g,"").trim());
      setF(f => ({...f, contexto:parsed.contexto||f.contexto, obj1:parsed.obj1||f.obj1, obj2:parsed.obj2||f.obj2, obj3:parsed.obj3||f.obj3}));
    } catch(e){}
    setLoading(false); setLoadMsg("");
  };

  const generate = async () => {
    setLoading(true); setLoadMsg("Gerando briefing final...");
    try {
      const s = await callAI("Gere contexto final polido para briefing Nuvemshop.\nInfluenciador: " + F.inf + "\nTema: " + F.tema + "\nContexto: " + F.contexto + "\nObj: " + F.obj1 + "\nCTA: " + F.cta, ctx);
      setAiSum(s);
    } catch(e){}
    setLoading(false); setLoadMsg(""); setStep(4);
  };

  const download = () => {
    const f = F;
    const html = `<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"/><title>Briefing ${f.inf}</title><style>body{font-family:Arial,sans-serif;color:#100E4C;margin:0}.hdr{background:#0050C3;color:#fff;padding:32px 40px}.hdr h1{font-size:24px;margin-bottom:4px}.hdr p{color:#99D3FF;font-size:11px}.bd{padding:32px 40px}.sec{margin-bottom:24px}.st{background:#0050C3;color:#fff;font-size:12px;font-weight:700;padding:8px 14px;margin-bottom:8px}table{width:100%;border-collapse:collapse;margin-bottom:12px}td{padding:6px 10px;border:1px solid #BDD5FF;font-size:12px}td.l{background:#99D3FF;color:#0050C3;font-weight:700;width:28%}.hl{border-left:4px solid #00B4E6;background:#E8F2FF;padding:8px 12px;font-size:12px;margin-bottom:10px}ul{padding-left:16px}ul li{font-size:12px;margin-bottom:4px}.ft{background:#F4F6FA;border-top:3px solid #0050C3;padding:14px 40px;font-size:11px;color:#6B7280;display:flex;justify-content:space-between}</style></head><body><div class="hdr"><p>NUVEMSHOP · SOCIAL MEDIA · ID: ${f.id}</p><h1>Briefing de Conteudo</h1><p>${f.inf} x Nuvemshop</p></div><div class="bd"><div class="sec"><div class="st">01 · INFORMACOES GERAIS</div><table><tr><td class="l">ID</td><td>${f.id||"—"}</td></tr><tr><td class="l">Influenciador</td><td>${f.inf||"—"}</td></tr><tr><td class="l">Tema</td><td>${f.tema||"—"}</td></tr><tr><td class="l">Data</td><td>${f.data||"—"}</td></tr><tr><td class="l">Entregas</td><td>${f.entregas||"—"}</td></tr><tr><td class="l">Responsavel</td><td>${f.resp||"—"}</td></tr></table></div><div class="sec"><div class="st">02 · CONTEXTO</div><p style="font-size:13px;margin-bottom:8px">${f.contexto||"—"}</p>${aiSum?`<div class="hl"><strong>Sintese IA:</strong><br/>${aiSum}</div>`:""}</div><div class="sec"><div class="st">03 · OBJETIVOS</div><ul>${f.obj1?`<li><strong>${f.obj1}</strong></li>`:""}${f.obj2?`<li>${f.obj2}</li>`:""}${f.obj3?`<li>${f.obj3}</li>`:""}</ul></div><div class="sec"><div class="st">04 · CTA</div><p style="font-size:13px">${f.cta||"—"}</p></div>${f.e1tema?`<div class="sec"><div class="st">05 · ENTREGA</div><table><tr><td class="l">Tema</td><td>${f.e1tema}</td></tr><tr><td class="l">Data</td><td>${f.e1data||"—"}</td></tr><tr><td class="l">Formato</td><td>${f.e1fmt||"—"}</td></tr><tr><td class="l">Objetivo</td><td>${f.e1obj||"—"}</td></tr></table></div>`:""}</div><div class="ft"><span>nuvemshop · Social Media</span><span style="font-style:italic">Uso interno</span></div></body></html>`;
    const blob = new Blob([html], {type:"text/html"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href=url; a.download="NS_Briefing_"+(f.inf||"NS").replace(/\s+/g,"_")+".html";
    a.click(); URL.revokeObjectURL(url);
  };

  const inp = (label,k,hint,half) => (
    <div style={{marginBottom:12,gridColumn:half?"span 1":"span 2"}}>
      <label style={{display:"block",fontSize:11,fontWeight:600,color:B.dark,marginBottom:4}}>{label}</label>
      <input value={F[k]} onChange={e=>set(k,e.target.value)} placeholder={hint||label}
        style={{width:"100%",padding:"8px 10px",fontSize:12,border:"1px solid "+B.bdr,borderRadius:6,color:B.dark,background:B.white,outline:"none"}}/>
    </div>
  );

  const ta = (label,k,rows,ai,hint) => {
    const busy = imp[k];
    return (
      <div style={{marginBottom:12,gridColumn:"span 2"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
          <label style={{fontSize:11,fontWeight:600,color:B.dark}}>{label}</label>
          {ai && <button onClick={()=>improve(k,ai)} disabled={busy||!F[k]}
            style={{fontSize:10,padding:"2px 10px",borderRadius:20,border:"1px solid "+B.sky,background:busy?B.clear:B.tint,color:B.blue,cursor:busy||!F[k]?"default":"pointer",opacity:!F[k]?.4:1}}>
            {busy?"melhorando...":"melhorar com IA"}
          </button>}
        </div>
        <textarea rows={rows||3} value={F[k]} onChange={e=>set(k,e.target.value)} placeholder={hint||label}
          style={{width:"100%",padding:"8px 10px",fontSize:12,border:"1px solid "+B.bdr,borderRadius:6,color:B.dark,background:B.white,outline:"none"}}/>
      </div>
    );
  };

  const H = ({n,t}) => <div style={{background:B.blue,color:B.white,padding:"9px 14px",marginBottom:16,borderRadius:4,fontWeight:700,fontSize:13}}>{n} - {t}</div>;
  const g = {display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 14px"};

  const renderStep = () => {
    if (step===0) return (
      <div><H n="01" t="IDENTIFICACAO"/>
        <div style={g}>
          {inp("ID da Nuvemshop","id","Ex: NS-2026-042",true)}
          {inp("Influenciador","inf","Nome x Nuvemshop",true)}
          {inp("Tema","tema","Titulo da campanha",true)}
          {inp("Data de publicacao","data","DD/MM/AAAA",true)}
          {inp("Entregas","entregas","Ex: 01 Reels + stories",true)}
          {inp("Formato","formato","9:16 vertical",true)}
          {inp("Collab","collab","@influenciador + @nuvemshop",true)}
          {inp("Responsavel NS","resp","Nome | email",true)}
        </div>
      </div>
    );
    if (step===1) return (
      <div><H n="02" t="CONTEXTO E OBJETIVO"/>
        <div style={{background:B.lt,border:"1.5px dashed "+B.sky,borderRadius:8,padding:"14px",marginBottom:16}}>
          <p style={{fontSize:11,fontWeight:700,color:B.blue,marginBottom:4}}>Documento do projeto</p>
          <p style={{fontSize:11,color:B.gray,marginBottom:10}}>Suba o doc (DOCX ou TXT) e a IA preenche os campos automaticamente.</p>
          <input ref={fileRef} type="file" accept=".docx,.txt" onChange={handleFile} style={{display:"none"}}/>
          <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
            <button onClick={()=>fileRef.current?.click()}
              style={{padding:"8px 16px",border:"1px solid "+B.bdr,borderRadius:6,background:B.white,color:B.dark,fontSize:12,cursor:"pointer"}}>
              {fileName ? "Arquivo: "+fileName : "Escolher arquivo"}
            </button>
            {ctx && <button onClick={gerarDoDoc} disabled={loading}
              style={{padding:"8px 16px",border:"none",borderRadius:6,background:loading?B.clear:B.sky,color:B.white,fontSize:12,cursor:"pointer",fontWeight:700}}>
              {loading ? loadMsg : "Gerar a partir do documento"}
            </button>}
          </div>
          {ctx && <p style={{fontSize:11,color:B.blue,marginTop:8}}>Documento carregado!</p>}
        </div>
        <div style={g}>
          {ta("Contexto da campanha","contexto",4,"contexto","O que esta sendo lancado?")}
          {inp("Link de materiais","linkMat","https://...",true)}
          <div style={{gridColumn:"span 2",borderTop:"1px solid "+B.bdr,margin:"4px 0 12px"}}/>
          {ta("Objetivo principal","obj1",2,"objetivo principal","Ex: gerar desejo no publico mid market")}
          {ta("Objetivo de conteudo","obj2",2,"objetivo de conteudo","Ex: evidenciar a marca como case")}
          {ta("Objetivo de negocio","obj3",2,"objetivo de negocio","Ex: converter lojistas para o plano Next")}
        </div>
      </div>
    );
    if (step===2) return (
      <div><H n="03" t="CTA E ENTREGAS"/>
        <div style={g}>
          {ta("CTA","cta",2,"call to action","Qual acao o publico deve tomar?")}
          {inp("Link do CTA","linkCta","https://...",true)}
        </div>
        <div style={{borderTop:"1px solid "+B.bdr,paddingTop:14,marginTop:4}}>
          <p style={{fontSize:11,fontWeight:700,color:B.blue,marginBottom:12}}>ENTREGA #01</p>
          <div style={g}>
            {inp("Tema","e1tema","Tema especifico",true)}
            {inp("Data","e1data","DD/MM/AAAA",true)}
            {inp("Formato","e1fmt","Reels | Stories",true)}
            {inp("Objetivo","e1obj","O que comunicar",true)}
            {ta("Destaques (1 por linha)","e1dest",3,"destaques","Pontos para destacar")}
          </div>
        </div>
      </div>
    );
    if (step===3) return (
      <div><H n="04" t="MENSAGENS-CHAVE"/>
        <div style={g}>
          {inp("Mensagem 1","msg1","Ex: Maior plataforma de e-commerce da AL",true)}
          {inp("Dado de apoio","msg1s","Ex: mais de 180 mil lojistas",true)}
          {inp("Mensagem 2","msg2","Ex: Simplicidade no uso",true)}
          {inp("Dado de apoio","msg2s","Ex: mais de 65 layouts",true)}
          {inp("Mensagem 3","msg3","Ex: Atende todos os tamanhos",true)}
          {inp("Dado de apoio","msg3s","Ex: do inicio ao faturamento em milhoes",true)}
        </div>
        <div style={{marginTop:8,padding:"10px 14px",background:B.tint,borderLeft:"3px solid "+B.sky,borderRadius:"0 6px 6px 0",fontSize:11,color:B.dark,fontStyle:"italic"}}>
          Assinatura: "Faz bonito. Faz com a Nuvemshop, a maior plataforma de e-commerce do Brasil e da America Latina."
        </div>
      </div>
    );
    if (step===4) return (
      <div><H n="05" t="PREVIEW E DOWNLOAD"/>
        <div style={{background:B.tint,border:"1px solid "+B.bdr,borderRadius:8,padding:"14px",marginBottom:16}}>
          <p style={{fontSize:10,fontWeight:700,color:B.blue,marginBottom:8}}>RESUMO</p>
          <table style={{width:"100%",fontSize:12,borderCollapse:"collapse"}}>
            {[["ID",F.id],["Influenciador",F.inf],["Tema",F.tema],["Data",F.data],["Entregas",F.entregas]].map(([l,v])=>v?
              <tr key={l}><td style={{padding:"3px 8px",color:B.blue,fontWeight:700,width:"30%"}}>{l}</td><td style={{padding:"3px 8px",color:B.dark}}>{v}</td></tr>:null
            )}
          </table>
        </div>
        {loading ? <div style={{display:"flex",alignItems:"center",gap:10,padding:"16px 0"}}>
          <div style={{width:18,height:18,border:"2px solid "+B.sky,borderTopColor:"transparent",borderRadius:"50%",animation:"spin 1s linear infinite"}}/>
          <p style={{color:B.sky,fontSize:13}}>{loadMsg}</p>
        </div> : <>
          {aiSum && <div style={{background:B.lt,border:"1.5px solid "+B.sky,borderRadius:8,padding:"12px",marginBottom:16}}>
            <p style={{fontSize:10,fontWeight:700,color:B.sky,marginBottom:6}}>SINTESE IA</p>
            <p style={{fontSize:13,color:B.dark,lineHeight:1.7,whiteSpace:"pre-wrap"}}>{aiSum}</p>
          </div>}
          <div style={{display:"flex",gap:12,marginTop:16}}>
            <button onClick={download} style={{flex:1,padding:"13px",background:B.blue,color:B.white,border:"none",borderRadius:8,fontSize:14,fontWeight:700,cursor:"pointer"}}>
              Baixar Briefing (.html)
            </button>
            <button onClick={()=>{setF(INIT);setStep(0);setAiSum("");setCtx("");setFileName("");}}
              style={{padding:"13px 20px",background:B.white,color:B.blue,border:"1.5px solid "+B.blue,borderRadius:8,fontSize:13,cursor:"pointer"}}>
              Novo
            </button>
          </div>
        </>}
      </div>
    );
  };

  return (
    <div style={{maxWidth:700,width:"100%"}}>
      <div style={{background:B.blue,padding:"18px 24px",borderRadius:"8px 8px 0 0"}}>
        <p style={{color:B.clear,fontSize:10,fontWeight:600,marginBottom:3}}>NUVEMSHOP - SOCIAL MEDIA</p>
        <h1 style={{color:B.white,fontSize:20,fontWeight:700,margin:0}}>Gerador de Briefing com IA</h1>
      </div>
      <div style={{height:3,background:B.bg}}>
        <div style={{height:3,background:B.sky,width:(step/4*100)+"%",transition:"width .3s"}}/>
      </div>
      <div style={{display:"flex",background:B.lt,borderBottom:"1px solid "+B.bdr}}>
        {STEPS.map((s,i) => (
          <button key={i} onClick={()=>i<=step&&setStep(i)}
            style={{flex:1,padding:"10px 2px",fontSize:10,fontWeight:i===step?700:400,color:i===step?B.blue:i<step?B.gray:B.bdr,background:"none",border:"none",borderBottom:i===step?"2.5px solid "+B.blue:"2.5px solid transparent",cursor:i<=step?"pointer":"default"}}>
            {i+1}. {s}
          </button>
        ))}
      </div>
      <div style={{background:B.white,border:"1px solid "+B.bdr,borderTop:"none",padding:"20px"}}>
        {renderStep()}
        {step < 4 && <div style={{display:"flex",justifyContent:"space-between",marginTop:18,paddingTop:14,borderTop:"1px solid "+B.bdr}}>
          <button onClick={()=>setStep(s=>Math.max(0,s-1))} disabled={step===0}
            style={{padding:"9px 22px",border:"1px solid "+B.bdr,background:B.white,color:step===0?B.bdr:B.dark,borderRadius:6,fontSize:12,cursor:step===0?"default":"pointer"}}>
            Anterior
          </button>
          {step < 3
            ? <button onClick={()=>setStep(s=>s+1)} style={{padding:"9px 26px",background:B.blue,color:B.white,border:"none",borderRadius:6,fontSize:12,fontWeight:700,cursor:"pointer"}}>Proximo</button>
            : <button onClick={generate} disabled={loading} style={{padding:"9px 26px",background:loading?B.clear:B.sky,color:B.white,border:"none",borderRadius:6,fontSize:12,fontWeight:700,cursor:loading?"default":"pointer"}}>{loading?"Gerando...":"Gerar Briefing com IA"}</button>
          }
        </div>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
